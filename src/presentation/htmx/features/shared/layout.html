<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ state.name }}{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --line: #d9dee7;
        --text: #1f2933;
        --muted: #667085;
        --accent: #0f766e;
        --ok: #15803d;
        --warn: #b45309;
        --danger: #b42318;
      }

      * { box-sizing: border-box; }

      [x-cloak] { display: none !important; }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .navbar {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .navbar-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        width: min(64rem, calc(100% - 2rem));
        margin: 0 auto;
        padding: .85rem 0;
      }

      .brand {
        color: var(--text);
        font-weight: 700;
        text-decoration: none;
      }

      .nav-actions,
      .actions,
      .links {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: .6rem;
      }

      .nav-actions { justify-content: flex-end; }

      main {
        width: min(56rem, calc(100% - 2rem));
        margin: 0 auto;
        padding: 3rem 0;
      }

      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        border-bottom: 1px solid var(--line);
        padding-bottom: 1.5rem;
      }

      h1 {
        margin: 0;
        font-size: 3rem;
        line-height: 1;
        letter-spacing: 0;
      }

      p { margin: .75rem 0 0; color: var(--muted); }

      a, button {
        border-radius: .5rem;
        font: inherit;
      }

      button,
      .button,
      .nav-link,
      .links a {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        padding: .65rem .85rem;
        text-decoration: none;
      }

      button:hover,
      .button:hover,
      .nav-link:hover,
      .links a:hover { border-color: var(--accent); }

      button:disabled {
        cursor: wait;
        opacity: .65;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: .75rem;
        margin-top: 1.5rem;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: .5rem;
        background: var(--panel);
        padding: 1rem;
      }

      .label {
        color: var(--muted);
        font-size: .75rem;
        text-transform: uppercase;
        letter-spacing: .08em;
      }

      .value {
        display: block;
        margin-top: .45rem;
        font-size: 1.35rem;
        font-weight: 700;
      }

      .ok { color: var(--ok); }
      .warn { color: var(--warn); }
      .danger { color: var(--danger); }

      .user {
        color: var(--muted);
        font-size: .9rem;
      }

      .error {
        margin-top: .75rem;
        border-color: color-mix(in srgb, var(--danger) 45%, var(--line));
      }

      .links {
        margin-top: 1.5rem;
      }

      .callback-panel {
        max-width: 32rem;
        margin: 2rem auto 0;
        text-align: center;
      }

      .spinner {
        display: inline-block;
        width: 2rem;
        height: 2rem;
        border: .25rem solid var(--line);
        border-top-color: var(--accent);
        border-radius: 999px;
        animation: spin .9s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @media (max-width: 720px) {
        .navbar-inner,
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        .nav-actions,
        .actions { justify-content: flex-start; }

        h1 { font-size: 2.25rem; }
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    {% include "shared/navbar.html" %}
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
