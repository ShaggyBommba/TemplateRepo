<aside class="sidebar">
  <a class="brand" href="/">
    <span class="brand-mark">S</span>
    <span class="brand-copy">
      <span class="brand-name">{{ state.name }}</span>
      <span class="brand-meta">SaaS template</span>
    </span>
  </a>

  <div class="nav-section">
    <span class="nav-label">Workspace</span>
    <ul class="menu menu-sm nav-list">
      <li>
        <a class="{{ 'active' if request.url.path == '/' else '' }}" href="/"
           hx-boost="true">
          <span class="nav-icon split" aria-hidden="true"></span>
          Overview
        </a>
      </li>
      <li>
        <a class="{{ 'active' if request.url.path == '/system' else '' }}" href="/system"
           hx-boost="true">
          <span class="nav-icon" aria-hidden="true"></span>
          System
        </a>
      </li>
      {% if user and "users:create" in (user.roles or []) %}
        <li>
          <a class="{{ 'active' if request.url.path == '/admin' else '' }}" href="/admin">
            <span class="nav-icon split" aria-hidden="true"></span>
            Admin
          </a>
        </li>
      {% endif %}
      <li>
        <a href="/status">
          <span class="nav-icon dot" aria-hidden="true"></span>
          Status API
        </a>
      </li>
    </ul>
  </div>

  <div class="card card-border bg-base-100 sidebar-footer">
    {% if user %}
      <div class="flow-stack">
        <span class="nav-label">Signed in</span>
        <span class="user">{{ user.username }}</span>
      </div>
      <a class="btn btn-sm btn-outline" href="/logout">
        <span class="button-icon" aria-hidden="true"></span>
        Logout
      </a>
    {% else %}
      <div class="flow-stack">
        <span class="nav-label">Access</span>
        <span class="user">External identity provider</span>
      </div>
      <a class="btn btn-sm btn-primary" href="/login">
        <span class="button-icon dot" aria-hidden="true"></span>
        Login
      </a>
    {% endif %}
  </div>
</aside>
