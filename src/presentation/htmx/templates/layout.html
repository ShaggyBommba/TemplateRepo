<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ state.name }}{% endblock %}</title>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f5f2;
        --panel: #ffffff;
        --line: #d8d4cc;
        --text: #1f2933;
        --muted: #667085;
        --accent: #0f766e;
        --ok: #15803d;
        --warn: #b45309;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(56rem, calc(100% - 2rem));
        margin: 0 auto;
        padding: 4rem 0;
      }

      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        border-bottom: 1px solid var(--line);
        padding-bottom: 1.5rem;
      }

      h1 {
        margin: 0;
        font-size: 3.25rem;
        line-height: 1;
        letter-spacing: 0;
      }

      p { margin: .75rem 0 0; color: var(--muted); }

      a, button {
        border-radius: .5rem;
        font: inherit;
      }

      button,
      .button {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        padding: .7rem .9rem;
        text-decoration: none;
      }

      button:hover,
      .button:hover { border-color: var(--accent); }

      button:disabled {
        cursor: wait;
        opacity: .65;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: .75rem;
        margin-top: 1.5rem;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: .5rem;
        background: var(--panel);
        padding: 1rem;
      }

      .label {
        color: var(--muted);
        font-size: .75rem;
        text-transform: uppercase;
        letter-spacing: .08em;
      }

      .value {
        display: block;
        margin-top: .45rem;
        font-size: 1.35rem;
        font-weight: 700;
      }

      .ok { color: var(--ok); }
      .warn { color: var(--warn); }

      .actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: .6rem;
      }

      .user {
        color: var(--muted);
        font-size: .9rem;
      }

      .error {
        margin-top: .75rem;
        border-color: color-mix(in srgb, var(--warn) 45%, var(--line));
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: .75rem;
        margin-top: 1.5rem;
      }

      .links a {
        border: 1px solid var(--line);
        color: var(--text);
        padding: .65rem .8rem;
        text-decoration: none;
      }

      .links a:hover { border-color: var(--accent); }

      @media (max-width: 720px) {
        header { flex-direction: column; }
        .actions { justify-content: flex-start; }
        h1 { font-size: 2.25rem; }
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
