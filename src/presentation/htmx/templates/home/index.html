{% extends "layout.html" %}

{% block title %}Home - {{ state.name }}{% endblock %}

{% block content %}
<div>
  <div class="topbar">
    <div class="user-line">
      <span class="badge badge-outline gap-2">
        <span class="status {{ 'status-success' if state.healthy else 'status-warning' }}" aria-hidden="true"></span>
        {{ state.status }}
      </span>
      <span class="badge badge-outline">v{{ state.version }}</span>
    </div>
    <div class="actions">
      {% if user %}
        <span class="user">{{ user.username }}</span>
        <a class="btn btn-sm btn-outline" href="/logout">Logout</a>
      {% else %}
        <a class="btn btn-sm btn-primary" href="/login">Login</a>
      {% endif %}
    </div>
  </div>

  <section class="page-head">
    <div>
      <p class="eyebrow meta-label">Workspace</p>
      <h1>Home</h1>
    </div>
  </section>
</div>
{% endblock %}
