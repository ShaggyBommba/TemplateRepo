{% extends "layout.html" %}

{% block title %}Admin - {{ state.name }}{% endblock %}

{% block content %}
<div
  x-data='adminPane({{ jobs_ws_url | tojson }}, {{ job_id | tojson }}, {{ heartbeat_url | tojson }})'
  x-init="jobId && connect()"
>
  <div class="topbar">
    <span class="badge badge-outline gap-2">
      <span class="status {{ 'status-success' if state.healthy else 'status-warning' }}" aria-hidden="true"></span>
      {{ state.status }}
    </span>
    <div class="actions">
      <span class="user">{{ user.username }}</span>
      <a class="btn btn-sm btn-outline" href="/logout">Logout</a>
    </div>
  </div>

  <section class="page-head">
    <div>
      <p class="eyebrow meta-label">Admin</p>
      <h1>Admin</h1>
    </div>
    <span class="badge badge-outline">users:create</span>
  </section>

  <section class="card card-border bg-base-200 panel section-space">
    <div class="panel-head">
      <h2>Job stream</h2>
      <span class="badge badge-outline" x-text="socketState">Idle</span>
    </div>
    <form class="flow-stack" @submit.prevent="startHeartbeat()">
      <label class="meta-label" for="heartbeat-beats">Heartbeat beats</label>
      <input
        class="input"
        id="heartbeat-beats"
        name="beats"
        type="number"
        min="1"
        inputmode="numeric"
        autocomplete="off"
        placeholder="Default beats"
        x-model="beats"
      >
      <div class="actions">
        <button
          type="submit"
          class="btn btn-sm btn-primary"
          :disabled="starting"
          :aria-busy="starting.toString()"
        >
          <span class="button-icon dot" aria-hidden="true"></span>
          Start heartbeat
        </button>
      </div>
    </form>
    <form class="flow-stack" @submit.prevent="connect()">
      <label class="meta-label" for="job-id">Job ID</label>
      <input
        class="input"
        id="job-id"
        name="job_id"
        type="text"
        autocomplete="off"
        placeholder="Paste a job id"
        x-model="jobId"
      >
      <div class="actions">
        <button type="submit" class="btn btn-sm btn-primary">
          <span class="button-icon dot" aria-hidden="true"></span>
          Connect
        </button>
        <button class="btn btn-sm btn-outline" type="button" @click="disconnect()" :disabled="!connected">
          Disconnect
        </button>
      </div>
    </form>
    <pre class="code-block" aria-live="polite" x-text="latestMessage || 'No websocket messages yet.'">No websocket messages yet.</pre>
    <template x-if="error">
      <p class="alert alert-error" role="alert" x-text="error"></p>
    </template>
  </section>
</div>

<script>
  function adminPane(wsTemplate, initialJobId, heartbeatUrl) {
    return {
      jobId: initialJobId,
      beats: "",
      starting: false,
      socketState: "Idle",
      latestMessage: "",
      error: "",
      connection: null,
      get connected() {
        return this.connection !== null && this.connection.readyState === WebSocket.OPEN;
      },
      async startHeartbeat() {
        this.error = "";
        this.starting = true;
        this.socketState = "Starting";
        try {
          const body = {};
          const beats = parseInt(this.beats, 10);
          if (!Number.isNaN(beats)) {
            body.beats = beats;
          }
          const response = await fetch(heartbeatUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (!response.ok) {
            throw new Error(`Request failed: ${response.status}`);
          }
          const data = await response.json();
          this.jobId = data.job_id;
          this.connect();
        } catch (err) {
          this.socketState = "Error";
          this.error = "Could not start heartbeat.";
        } finally {
          this.starting = false;
        }
      },
      connect() {
        const id = this.jobId.trim();
        this.error = "";
        if (!id) {
          this.error = "Enter a job id before connecting.";
          return;
        }

        this.disconnect();
        const url = wsTemplate.replace("{job_id}", encodeURIComponent(id));
        this.socketState = "Connecting";
        this.connection = new WebSocket(url);
        this.connection.addEventListener("open", () => {
          this.socketState = "Connected";
        });
        this.connection.addEventListener("message", (event) => {
          this.latestMessage = event.data;
        });
        this.connection.addEventListener("close", () => {
          this.socketState = "Closed";
          this.connection = null;
        });
        this.connection.addEventListener("error", () => {
          this.socketState = "Error";
          this.error = "Websocket connection failed.";
        });
      },
      disconnect() {
        if (this.connection !== null) {
          this.connection.close();
          this.connection = null;
        }
      },
    };
  }
</script>
{% endblock %}
