services:

  # Traefik service acting as a reverse proxy and load balancer for routing requests to the appropriate services.
  traefik:
    image: traefik:v3.3
    command:
      - --log.level=INFO
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=proxy
      - --entrypoints.web.address=:80
    ports:
      - "${APP_TRAEFIK__HTTP_PORT:-80}:80"
      - "${APP_TRAEFIK__HTTPS_PORT:-443}:443"
      - "${APP_TRAEFIK__DASHBOARD_PORT:-8089}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    profiles:
      - infrastructure
    restart: unless-stopped

  # Database service will use Postgres for storing application data.
  # But also handeling the jobs using the outbox pattern.
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${APP_DATABASE__DATABASE:-app}
      POSTGRES_USER: ${APP_DATABASE__USER:-app}
      POSTGRES_PASSWORD: ${APP_DATABASE__PASSWORD:-app}
    ports:
      - "${APP_DATABASE__HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    profiles:
      - infrastructure
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DATABASE__USER:-app} -d ${APP_DATABASE__DATABASE:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - internal

  # Keycloak service for authentication and authorization.
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${APP_KEYCLOAK__ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${APP_KEYCLOAK__ADMIN_PASSWORD:-admin}
      # Database configuration
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${APP_DATABASE__DATABASE:-app}
      KC_DB_USERNAME: ${APP_DATABASE__USER:-app}
      KC_DB_PASSWORD: ${APP_DATABASE__PASSWORD:-app}
      # HTTP configuration
      KC_HTTP_ENABLED: "true"
    ports:
      - "${APP_KEYCLOAK__PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - infrastructure
    restart: unless-stopped
    volumes:
      - ./config/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.keycloak.rule=Host(`${APP_KEYCLOAK__DOMAIN:-keycloak.localhost}`)
      - traefik.http.routers.keycloak.entrypoints=web
      - traefik.http.routers.keycloak.service=keycloak
      - traefik.http.services.keycloak.loadbalancer.server.port=8080

  # Log viewer for monitoring application logs in real-time.
  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${APP_DOZZLE__HOST_PORT:-8888}:8080"
    profiles:
      - infrastructure
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.dozzle.rule=Host(`${APP_DOZZLE__DOMAIN:-dozzle.localhost}`)
      - traefik.http.routers.dozzle.entrypoints=web
      - traefik.http.routers.dozzle.service=dozzle
      - traefik.http.services.dozzle.loadbalancer.server.port=8080

volumes:
  postgres_data:

networks:
  internal:
  proxy:
