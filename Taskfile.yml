version: "3"

vars:
  IMAGE: ghcr.io/your-org/template
  CONTAINER: template
  TAG: latest

tasks:
  sync:
    desc: Install dependencies
    cmds:
      - uv sync --dev

  test:
    desc: Run backend tests
    cmds:
      - uv run python -m pytest

  lint:
    desc: Lint backend source
    cmds:
      - uv run python -m ruff check src tests

  format:
    desc: Format backend source
    cmds:
      - uv run python -m ruff format src tests

  format-check:
    desc: Check backend formatting
    cmds:
      - uv run python -m ruff format --check src tests

  hooks:
    desc: Run pre-commit hooks
    cmds:
      - uv run pre-commit run --config .github/hooks/.pre-commit-config.yaml --all-files

  install-hooks:
    desc: Install local git hooks
    cmds:
      - uv run pre-commit install --config .github/hooks/.pre-commit-config.yaml

  css:
    desc: Build the HTMX stylesheet (Tailwind + daisyUI, no Node)
    cmds:
      - uv run tailwindcss-extra -i src/presentation/htmx/static/css/input.css -o src/presentation/htmx/static/css/app.css --minify

  css-watch:
    desc: Rebuild the HTMX stylesheet on change
    cmds:
      - uv run tailwindcss-extra -i src/presentation/htmx/static/css/input.css -o src/presentation/htmx/static/css/app.css --watch

  check:
    desc: Run backend checks
    cmds:
      - task: format-check
      - task: lint
      - task: test

  infra:
    desc: Start infrastructure containers if they are not already running
    cmds:
      - docker compose -f infrastructure/docker-compose.yml --profile infrastructure up -d
    status:
      - docker compose -f infrastructure/docker-compose.yml ps --format json db | grep -q '"State":"running"'

  dev:
    desc: Run the application in development mode
    cmds:
      - task: infra
      - task: css
      - uv run dev

  clean:
    desc: Remove backend cache files
    cmds:
      - find src tests -type d -name __pycache__ -prune -exec rm -rf {} +
      - find src tests -type f -name "*.py[co]" -delete
      - rm -rf .pytest_cache .ruff_cache src/*.egg-info

  build:
    desc: Build the Docker image
    cmds:
      - docker build -t {{.IMAGE}}:{{.TAG}} .

  push:
    desc: Push the Docker image to the registry
    deps: [build]
    cmds:
      - docker push {{.IMAGE}}:{{.TAG}}

  deploy:
    desc: Deploy the Docker image to production
    deps: [push]
    cmds:
      - echo "Deploying {{.IMAGE}}:{{.TAG}} to production..."
      - >
        docker run -d --name {{.CONTAINER}}
        -e APP_API_PORT="${APP_API_PORT:-8060}"
        -e APP_HTMX_PORT="${APP_HTMX_PORT:-8061}"
        -p "${APP_API_PORT:-8060}:${APP_API_PORT:-8060}"
        -p "${APP_HTMX_PORT:-8061}:${APP_HTMX_PORT:-8061}"
        {{.IMAGE}}:{{.TAG}}

  default:
    desc: Show all tasks
    cmds:
      - task --list
