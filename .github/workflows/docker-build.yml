name: Build and Push Docker Image

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Permissions required to read repository content and write to GHCR
    permissions:
      contents: read
      packages: write
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_DATABASE__HOST: localhost
      APP_DATABASE__PORT: 5432
      APP_DATABASE__USER: app
      APP_DATABASE__PASSWORD: app
      APP_DATABASE__DATABASE: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --dev --locked

      - name: Validate compose config
        run: docker compose -f infrastructure/docker-compose.yml config --quiet

      - name: Build CSS
        run: uv run tailwindcss-extra -i src/presentation/htmx/static/css/input.css -o /tmp/template-app.css --minify

      - name: Check formatting
        run: uv run python -m ruff format --check src tests migrations

      - name: Lint
        run: uv run python -m ruff check src tests migrations

      - name: Test
        run: uv run python -m pytest

      - name: Validate migrations
        run: |
          uv run alembic upgrade head
          uv run alembic check

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Automatically tags with 'latest' and the short Git commit SHA
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Enables GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
